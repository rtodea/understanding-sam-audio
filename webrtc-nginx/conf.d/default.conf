# The map directive must live at the http context level.
# Since conf.d/ is included inside the http block of the base nginx.conf,
# placing it here is correct.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

server {
    listen 80;

    # ── WebSocket endpoint ────────────────────────────────────────────────
    # Must be matched before the generic /api/ block.
    location /api/ws/ {
        proxy_pass         http://webrtc-server:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API (health check, etc.) ─────────────────────────────────────
    location /api/ {
        proxy_pass       http://webrtc-server:8000/;
        proxy_set_header Host $host;
    }

    # ── Frontend static files ─────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Explicit MIME types so browsers accept ES modules without errors.
        types {
            text/html              html htm;
            application/javascript js mjs;
            text/css               css;
            image/svg+xml          svg svgz;
            application/json       json;
            font/woff2             woff2;
        }
    }
}
